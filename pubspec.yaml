name: asir_smart_experience
description: Asir Smart Experience — Flutter app (mobile + web) with Flask backend.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.3.3
  http: ^1.2.2
  crypto: ^3.0.5
  url_launcher: ^6.3.1
  path: ^1.9.0
  path_provider: ^2.1.4
  sqflite: ^2.3.3+2
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
